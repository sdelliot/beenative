name: Build Flet App

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  pull_request:
  workflow_dispatch:

env:
  UV_PYTHON: 3.12
  PYTHONUTF8: 1

  # https://docs.flet.dev/reference/environment-variables
  FLET_CLI_NO_RICH_OUTPUT: 1
  USE_SYSTEM_PYTHON: true

permissions:
  contents: read

jobs:
  build:
    name: Build ${{ matrix.name }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # -------- Desktop --------
          - name: linux
            runner: ubuntu-latest
            build_cmd: "flet build linux"
            artifact_path: build/linux

          - name: macos
            runner: macos-latest
            build_cmd: "flet build macos"
            artifact_path: build/macos

          - name: windows
            runner: windows-latest
            build_cmd: "flet build windows"
            artifact_path: build/windows

          # -------- Android --------
          # - name: aab
          #   runner: ubuntu-latest
          #   build_cmd: "flet build aab"
          #   artifact_path: build/aab

          # - name: apk
          #   runner: ubuntu-latest
          #   build_cmd: "flet build apk"
          #   artifact_path: build/apk

          # -------- iOS --------
          # - name: ipa
          #   runner: macos-latest
          #   build_cmd: "flet build ipa"
          #   artifact_path: build/ipa

          # - name: ios-simulator
          #   runner: macos-latest
          #   build_cmd: "flet build ios-simulator"
          #   artifact_path: build/ios-simulator

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup uv
        uses: astral-sh/setup-uv@v6

      - name: Install Dependencies
        run: make install

      - name: Build app
        shell: bash
        run: |
          uv run ${{ matrix.build_cmd }} --build-number ${{ github.run_number }} --yes --verbose --skip-flutter-doctor

      - name: Package Assets
        shell: bash
        run: |
          # 1. Determine the version string
          if [[ "${{ github.ref_type }}" == "tag" ]]; then
            VERSION="${{ github.ref_name }}"
          else
            # Get the first 7 characters of the SHA
            VERSION=$(echo "${{ github.sha }}" | cut -c1-7)
          fi

          # 2. Define the final filename
          FILE_NAME="BeeNative-${VERSION}-${{ matrix.name }}.zip"
          echo "Packaging $FILE_NAME"

          # 7z 'a' (add) -r (recurse)
          # Pointing directly at the folder ensures everything is captured
          7z a -r "$FILE_NAME" "./${{ matrix.artifact_path }}"
          (cd "${{ matrix.artifact_path }}" && 7z a -r "../../$FILE_NAME" .)

          # 4. Set environment variable for the next step
          echo "FINAL_ZIP=$FILE_NAME" >> $GITHUB_ENV

      - name: Upload Artifact
        uses: actions/upload-artifact@v7
        with:
          name: build-artifacts-${{ matrix.name }}
          path: ${{ env.FINAL_ZIP }}
          if-no-files-found: error
          overwrite: false
          include-hidden-files: true

  release:
    name: Update GitHub Release
    needs: build
    runs-on: ubuntu-latest
    if: github.ref_type == 'tag'
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v7
        with:
          pattern: build-artifacts-*
          path: ./dist
          merge-multiple: true

      - name: Display structure (Debug)
        run: ls -R ./dist

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: ./dist/*.zip
