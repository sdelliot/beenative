name: Build Flet App

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  pull_request:
  workflow_dispatch:

env:
  UV_PYTHON: 3.12
  PYTHONUTF8: 1

  # https://docs.flet.dev/reference/environment-variables
  FLET_CLI_NO_RICH_OUTPUT: 1
  USE_SYSTEM_PYTHON: true

jobs:
  build:
    name: Build ${{ matrix.name }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # -------- Desktop --------
          - name: linux
            runner: ubuntu-latest
            build_cmd: "flet build linux"
            artifact_path: build/linux

          - name: macos
            runner: macos-latest
            build_cmd: "flet build macos"
            artifact_path: build/macos

          # - name: windows
          #   runner: windows-latest
          #   build_cmd: "flet build windows"
          #   artifact_path: build/windows

          # -------- Android --------
          # - name: aab
          #   runner: ubuntu-latest
          #   build_cmd: "flet build aab"
          #   artifact_path: build/aab

          # - name: apk
          #   runner: ubuntu-latest
          #   build_cmd: "flet build apk"
          #   artifact_path: build/apk

          # -------- iOS --------
          # - name: ipa
          #   runner: macos-latest
          #   build_cmd: "flet build ipa"
          #   artifact_path: build/ipa

          # - name: ios-simulator
          #   runner: macos-latest
          #   build_cmd: "flet build ios-simulator"
          #   artifact_path: build/ios-simulator

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup uv
        uses: astral-sh/setup-uv@v6

      - name: Install Dependencies
        run: make install

      - name: Install macOS System Dependencies
        if: runner.os == 'macOS'
        run: |
          # Use -q for cleaner logs
          brew install -q libjpeg libtiff little-cms2 openjpeg webp

          # Note: macos-latest (M1/M2) uses /opt/homebrew. Intel uses /usr/local.
          if [ -d "/opt/homebrew/opt" ]; then
            BREW_PREFIX="/opt/homebrew"
          else
            BREW_PREFIX="/usr/local"
          fi

          echo "LDFLAGS=-L$BREW_PREFIX/opt/libjpeg/lib -L$BREW_PREFIX/opt/libtiff/lib" >> $GITHUB_ENV
          echo "CPPFLAGS=-I$BREW_PREFIX/opt/libjpeg/include -I$BREW_PREFIX/opt/libtiff/include" >> $GITHUB_ENV

      - name: Build app
        shell: bash
        run: |
          uv run ${{ matrix.build_cmd }} --build-number ${{ github.run_number }} --yes -vv --skip-flutter-doctor --no-cleanup-packages

      - name: Fix macOS Missing Dylibs
        if: matrix.name == 'macos'
        run: |
          echo "Starting post-build dylib injection..."

          # 1. Define Paths
          # Note: flet build creates a 'build' folder in project root
          BUNDLE_PIL="build/macos/BeeNative.app/Contents/Frameworks/serious_python_darwin.framework/Resources/python.bundle/Contents/Resources/site-packages/PIL"

          # serious_python stores temporary site-packages during build here:
          SOURCE_DYLIBS_ARM="build/site-packages/arm64/PIL/.dylibs"
          SOURCE_DYLIBS_X86="build/site-packages/x86_64/PIL/.dylibs"

          echo "VIEWING BUNDLE_PIL"
          ls -lahR "$BUNDLE_PIL"

      
      - name: Fix macOS Missing Dylibs
        if: matrix.name == 'macos'
        run: |
          echo "Starting post-build dylib injection from Homebrew..."
          
          # 1. Destination inside your built app
          BUNDLE_PIL="build/macos/BeeNative.app/Contents/Frameworks/serious_python_darwin.framework/Resources/python.bundle/Contents/Resources/site-packages/PIL"
          mkdir -p "$BUNDLE_PIL/.dylibs"

          # 2. Identify the Homebrew prefix (ARM vs Intel)
          if [ -d "/opt/homebrew/opt" ]; then BREW_PREFIX="/opt/homebrew"; else BREW_PREFIX="/usr/local"; fi

          # 3. Manually copy the specific libraries Pillow is looking for
          # These names match exactly what was in your otool output earlier
          cp "$BREW_PREFIX/opt/libtiff/lib/libtiff.6.dylib" "$BUNDLE_PIL/.dylibs/"
          cp "$BREW_PREFIX/opt/jpeg/lib/libjpeg.62.dylib" "$BUNDLE_PIL/.dylibs/"
          cp "$BREW_PREFIX/opt/openjpeg/lib/libopenjp2.7.dylib" "$BUNDLE_PIL/.dylibs/"

          echo "Injection complete. Verifying bundle contents:"
          ls -la "$BUNDLE_PIL/.dylibs"

      - name: Upload Artifact
        uses: actions/upload-artifact@v5.0.0
        with:
          name: ${{ matrix.name }}-build-artifact
          path: ${{ matrix.artifact_path }}
          if-no-files-found: error
          overwrite: false
